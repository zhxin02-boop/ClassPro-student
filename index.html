<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ClassPro · 学生端</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.0/mqtt.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;background:#f0f4f8;min-height:100vh;color:#333}
.hdr{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;padding:14px 20px;text-align:center;position:sticky;top:0;z-index:10}
.hdr h1{font-size:17px;font-weight:700;margin:0}.hdr .sub{font-size:11px;opacity:.8;margin-top:3px}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}.dot.on{background:#4ade80}.dot.off{background:#f87171}
.tabs{display:flex;background:#fff;border-bottom:2px solid #e5e7eb;position:sticky;top:52px;z-index:9}
.tab{flex:1;padding:10px 4px;font-size:12px;font-weight:600;border:none;background:none;cursor:pointer;color:#888;border-bottom:3px solid transparent}
.tab.on{color:#6366f1;border-bottom-color:#6366f1;background:#faf5ff}
.sec{padding:16px 20px;background:#fff;margin-top:6px}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.sel{width:100%;padding:11px 16px;font-size:15px;border:2px solid #e5e7eb;border-radius:12px;background:#f9fafb;appearance:none}
.sel:focus{outline:none;border-color:#6366f1}
.inp{width:100%;padding:12px;font-size:15px;border:2px solid #e5e7eb;border-radius:12px;resize:none;min-height:70px;font-family:inherit}
.inp:focus{outline:none;border-color:#6366f1}
.btn{width:100%;padding:13px;font-size:15px;font-weight:700;border:none;border-radius:12px;cursor:pointer;margin-top:10px;color:#fff;background:linear-gradient(135deg,#6366f1,#8b5cf6)}
.btn:active{transform:scale(.98)}.btn:disabled{opacity:.4}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:100;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.15);animation:tin .3s;max-width:90%}
.toast.like{background:#fef3c7;color:#92400e;border:2px solid #fbbf24}
.toast.sent{background:#dcfce7;color:#166534;border:2px solid #4ade80}
.toast.rpt{background:#f3e8ff;color:#6b21a8;border:2px solid #a78bfa}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(-15px)}to{opacity:1;transform:translateX(-50%)}}
.rec{padding:10px;margin-bottom:8px;background:#f9fafb;border-radius:10px;border-left:4px solid #6366f1}
.empty{text-align:center;color:#9ca3af;padding:25px 0;font-size:13px}
.err-card{padding:12px;margin:8px 0;border-radius:10px;background:#fef2f2;border-left:4px solid #ef4444}
.ex-card{padding:12px;margin:8px 0;border-radius:10px;background:#eff6ff;border-left:4px solid #3b82f6}
.ex-ans{display:none;color:#10b981;font-weight:600;margin-top:6px}.ex-ans.show{display:block}
.abtn{background:#e0e7ff;color:#4338ca;border:none;padding:4px 12px;border-radius:8px;font-size:12px;cursor:pointer;margin-top:6px;font-weight:600}
/* Review tab */
.wcard{background:#fff;border:2px solid #e5e7eb;border-radius:12px;padding:14px;margin:8px 0;cursor:pointer;transition:.2s}
.wcard:active{border-color:#6366f1;background:#faf5ff}
.wcard .w{font-size:24px;font-weight:700}.wcard .py{font-size:13px;color:#888}.wcard .en{font-size:12px;color:#666}
.wdetail{background:#f9fafb;border-radius:10px;padding:12px;margin-top:8px}
.wex{padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.wex .cn{font-weight:500}.wex .enn{font-size:12px;color:#888;font-style:italic}
.gstep{padding:10px;margin:6px 0;border-radius:8px;border-left:3px solid #e5e7eb}
.gstep.reveal{border-color:#f59e0b;background:#fffbeb}
.gstep.example{border-color:#3b82f6;background:#eff6ff}
.gstep.formula{border-color:#10b981;background:#f0fdf4}
.tf-btn{padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:2px solid #e5e7eb;background:#fff;margin:4px}
.tf-btn:disabled{opacity:.5}
.stat-row{display:flex;gap:10px;margin-top:10px}
.stat-box{flex:1;text-align:center;padding:8px;background:#f9fafb;border-radius:8px}
.stat-num{font-size:18px;font-weight:700}.stat-lbl{font-size:10px;color:#888;margin-top:2px}

/* Answer Window */
.qw-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;animation:fadeQw .3s}
@keyframes fadeQw{from{opacity:0}to{opacity:1}}
.qw-card{background:#fff;border-radius:20px;width:100%;max-width:400px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.qw-header{padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
.qw-header .timer{font-size:28px;font-weight:900;font-family:'Courier New',monospace}
.qw-header .timer.warn{color:#dc2626;animation:pulse .5s infinite}
.qw-header .timer.normal{color:#2563eb}
.qw-header .status{font-size:12px;font-weight:600;padding:4px 10px;border-radius:12px}
.qw-body{padding:0 18px 18px}
.qw-question{font-size:18px;font-weight:600;line-height:1.6;margin-bottom:14px;color:#1f2937}
.qw-hint{font-size:13px;color:#6b7280;font-style:italic;margin-bottom:12px}
.qw-options{display:grid;gap:8px}
.qw-opt{padding:14px;border-radius:12px;border:2px solid #e5e7eb;background:#fff;font-size:16px;font-weight:600;cursor:pointer;text-align:center;transition:.2s}
.qw-opt:active{transform:scale(.97)}
.qw-opt.selected{border-color:#3b82f6;background:#eff6ff;color:#1e40af}
.qw-opt.correct{border-color:#10b981;background:#dcfce7;color:#166534}
.qw-opt.wrong{border-color:#ef4444;background:#fee2e2;color:#991b1b}
.qw-opt:disabled{opacity:.7;cursor:default}
.qw-input{width:100%;padding:14px;border:2px solid #e5e7eb;border-radius:12px;font-size:16px;min-height:80px;resize:none;font-family:inherit}
.qw-input:focus{outline:none;border-color:#3b82f6}
.qw-submit{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px}
.qw-submit:active{transform:scale(.98)}
.qw-submit:disabled{opacity:.4}
.qw-result{text-align:center;padding:20px;border-radius:12px;margin-top:12px;font-weight:700;font-size:16px}
.qw-result.correct{background:#dcfce7;color:#166534}
.qw-result.wrong{background:#fee2e2;color:#991b1b}
.qw-result.pending{background:#fef3c7;color:#92400e}
.qw-locked{text-align:center;padding:30px;color:#6b7280;font-weight:600;font-size:14px}


.stu-scores{margin-top:12px;background:#fff;border-radius:12px;overflow:hidden;border:2px solid #e5e7eb}
.stu-scores-hdr{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;padding:8px 14px;font-size:13px;font-weight:700;display:flex;justify-content:space-between;cursor:pointer}
.stu-score-row{display:flex;justify-content:space-between;padding:6px 14px;font-size:13px;border-bottom:1px solid #f3f4f6;align-items:center}
.stu-score-row.me{background:#eff6ff;font-weight:700;color:#1e40af}
.stu-score-row .rank{min-width:24px;font-weight:700}
.stu-score-row .pts{font-weight:800;color:#6366f1;min-width:36px;text-align:right}
</style>
</head>
<body>
<div class="hdr"><h1>📡 ClassPro · 学生端</h1><div class="sub"><span class="dot" id="dot"></span><span id="stxt">连接中...</span></div></div>
<div class="tabs">
<button class="tab on" onclick="stab('a')" id="ta">📡 课堂互动</button>
<button class="tab" onclick="stab('b')" id="tb">📋 课后报告</button>
<button class="tab" onclick="stab('c')" id="tc">📖 复习课件</button>
</div>

<!-- TAB A: Interact -->
<div id="pa">
<div class="sec" style="border-bottom:1px solid #e5e7eb">
<div id="ns"><label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px">👤 选择名字</label>
<select class="sel" id="nm" onchange="onN()"><option value="">请选择...</option>
<option value="Jin jilin">Jin jilin 金激琳</option><option value="Andrew">Andrew</option><option value="Rui xiang">Rui xiang 瑞祥</option><option value="Jin rui">Jin rui 金瑞</option><option value="Mo tong">Mo tong 魔童</option><option value="Qiaodan">Qiaodan 乔丹</option><option value="Jialin">Jialin 佳林</option><option value="Yue xin">Yue xin 月馨</option><option value="Xin yu">Xin yu 馨语</option><option value="Luni make">Luni make 鲁尼马克</option><option value="Vincent">Vincent</option><option value="Musa">Musa 穆萨</option><option value="Eifa">Eifa</option><option value="Wan er">Wan er 婉儿</option><option value="Hongyu">Hongyu 鸿语</option><option value="Luzian">Luzian 卢子安</option><option value="Issa">Issa</option><option value="Yazan">Yazan</option><option value="彭派克（keen）">彭派克（keen）</option></select></div>
<div id="nk" style="display:none;margin-top:8px;padding:8px 12px;background:#f0fdf4;border:2px solid #86efac;border-radius:10px;display:none"><span style="font-weight:700;color:#166534">👤 <span id="nd"></span></span> <button onclick="chN()" style="background:none;border:none;color:#888;font-size:11px;cursor:pointer;text-decoration:underline;margin-left:10px">切换</button></div>
</div>
<div class="sec"><h3 style="font-size:13px;color:#888;margin-bottom:8px">✍️ 输入答案</h3><textarea class="inp" id="ip" placeholder="输入答案..."></textarea><button class="btn" id="sb" onclick="send()" disabled>发送 ✈️</button></div>
<div class="sec"><h3 style="font-size:13px;font-weight:600;display:flex;justify-content:space-between"><span>📝 记录</span><span id="sl" style="color:#6366f1">0分</span></h3><div id="rl"><div class="empty">还没有提交</div></div>
<div class="sec" id="homeScoreSection" style="display:none">
<h3 style="font-size:13px;font-weight:600;display:flex;justify-content:space-between;margin-bottom:8px"><span>📊 积分榜</span><button onclick="document.getElementById('homeScoreBody').style.display=document.getElementById('homeScoreBody').style.display==='none'?'block':'none'" style="background:#e0e7ff;color:#4338ca;border:none;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer">展开/收起</button></h3>
<div id="homeScoreBody"></div>
</div>
</div>

<!-- TAB B: Report -->
<div id="pb" style="display:none"><div style="padding:16px 20px">
<div id="nr" class="card" style="text-align:center;padding:35px"><div style="font-size:36px;margin-bottom:8px">📭</div><div style="font-weight:600">还没有课后报告</div><div style="font-size:12px;color:#888;margin-top:4px">老师下课时会发送</div></div>
<div id="rb" style="display:none">
<div class="card"><div style="font-size:12px;color:#888" id="rL"></div><div style="display:flex;align-items:center;gap:15px;margin-top:6px"><div style="font-size:32px;font-weight:900;color:#6366f1" id="rS">0</div><div style="font-size:13px;color:#888">分<br><span id="rD"></span></div></div>
<div class="stat-row"><div class="stat-box"><div class="stat-num" id="sC" style="color:#10b981">0</div><div class="stat-lbl">正确</div></div><div class="stat-box"><div class="stat-num" id="sW" style="color:#ef4444">0</div><div class="stat-lbl">错误</div></div><div class="stat-box"><div class="stat-num" id="sP" style="color:#6366f1">0%</div><div class="stat-lbl">正确率</div></div></div></div>
<div class="card" id="eS" style="display:none"><h3 style="font-size:14px;margin-bottom:8px">❌ 我的错题 (<span id="eN">0</span>)</h3><div id="eL"></div></div>
<div class="card" id="xS" style="display:none"><h3 style="font-size:14px;margin-bottom:8px">🎯 针对性练习 (<span id="xN">0</span>)</h3><div style="font-size:11px;color:#888;margin-bottom:8px">根据你的课堂错题，老师为你准备的专项练习</div><div id="xL"></div></div>
</div></div></div>

<!-- TAB C: Review Courseware -->
<div id="pc" style="display:none"><div style="padding:16px 20px">
<div id="ncw" class="card" style="text-align:center;padding:35px"><div style="font-size:36px;margin-bottom:8px">📖</div><div style="font-weight:600">还没有收到课件数据</div><div style="font-size:12px;color:#888;margin-top:4px">老师发送课后报告时会一起发送</div></div>
<div id="cw" style="display:none">
<div style="font-size:16px;font-weight:700;color:#374151;margin-bottom:12px" id="cwTitle"></div>

<!-- Sub-tabs for courseware -->
<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
<button class="abtn" onclick="cwTab('vocab')" id="cwt1" style="background:#6366f1;color:#fff">📖 词汇</button>
<button class="abtn" onclick="cwTab('grammar')" id="cwt2">📐 语法</button>
<button class="abtn" onclick="cwTab('text')" id="cwt3">📝 课文</button>
<button class="abtn" onclick="cwTab('quiz')" id="cwt4">✍️ 自测</button>
</div>

<div id="cwVocab"></div>
<div id="cwGrammar" style="display:none"></div>
<div id="cwText" style="display:none"></div>
<div id="cwQuiz" style="display:none"></div>
</div>
</div></div>


<!-- Answer Window Overlay -->
<div id="qwOverlay" class="qw-overlay" style="display:none">
<div class="qw-card">
<div class="qw-header" style="background:linear-gradient(135deg,#eff6ff,#dbeafe)">
<div><span style="font-size:13px;font-weight:700;color:#1e40af" id="qwLabel">📡 答题中</span></div>
<div class="timer normal" id="qwTimer">--</div>
<div class="status" id="qwStatus" style="background:#dbeafe;color:#1e40af">进行中</div>
</div>
<div class="qw-body" id="qwBody">
<!-- Dynamic content inserted by JS -->
</div>
</div>
</div>

<div id="tc2"></div>
<script>
const MQ='wss://05d1d5baec9d4cb3a21f5517b430cff1.s1.eu.hivemq.cloud:8884/mqtt',MU='classpro',MP='Classpro2026',RM='8888';
// Google Sheet webhook (自动从老师发送的报告中获取)
let GAS_URL = localStorage.getItem('cp_gas_url') || '';

const CA=`classpro/room/${RM}/answers`,CF=`classpro/room/${RM}/feedback`,CR=`classpro/room/${RM}/report`,CQ=`classpro/room/${RM}/question`;
let N=localStorage.getItem('classpro_name')||'',cl=null,rec=[],sc=0,rptData=null;

window.onload=()=>{if(N){document.getElementById('nm').value=N;onN()}
const s=localStorage.getItem('cp_report');if(s){try{rptData=JSON.parse(s);showRpt(rptData);if(rptData.courseware)showCW(rptData.courseware,rptData.lesson)}catch(e){}}
connectMQ()};

function stab(t){['a','b','c'].forEach(x=>{document.getElementById('p'+x).style.display=x===t?'block':'none';document.getElementById('t'+x).className='tab'+(x===t?' on':'')})};
function onN(){const s=document.getElementById('nm');N=s.value;if(N){localStorage.setItem('classpro_name',N);document.getElementById('sb').disabled=false;document.getElementById('nk').style.display='block';document.getElementById('nd').textContent=N}else{document.getElementById('sb').disabled=true;document.getElementById('nk').style.display='none'}}
function chN(){document.getElementById('nm').value='';document.getElementById('nk').style.display='none';document.getElementById('sb').disabled=true;N='';localStorage.removeItem('classpro_name')}

function connectMQ(){cl=mqtt.connect(MQ,{username:MU,password:MP,clientId:'s_'+Math.random().toString(16).substr(2,8)});
cl.on('connect',()=>{upSt(true);cl.subscribe(CF);cl.subscribe(CR);cl.subscribe(CQ)});cl.on('error',()=>upSt(false));cl.on('close',()=>upSt(false));
cl.on('message',(t,m)=>{try{const d=JSON.parse(m.toString());if(t===CF)onFB(d);if(t===CR)onRpt(d);if(t===CQ)onQW(d)}catch(e){}})}
function upSt(on){document.getElementById('dot').className='dot '+(on?'on':'off');document.getElementById('stxt').textContent=on?'已连接 · Room '+RM:'未连接'}

function send(){const i=document.getElementById('ip'),tx=i.value.trim();if(!N){N=document.getElementById('nm').value;if(!N){alert('请先选择名字');return}}if(!tx||!cl)return;
const tm=new Date().toLocaleTimeString('zh-CN',{hour12:false});cl.publish(CA,JSON.stringify({name:N,text:tx,time:tm}));i.value='';rec.unshift({text:tx,time:tm,likes:0,comment:'',result:null});drawRec();toast('✅ 已发送','sent')}
document.addEventListener('DOMContentLoaded',()=>{document.getElementById('ip').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}})});

function onFB(d){const tgt=(d.targetName||'').toLowerCase().trim(),me=N.toLowerCase().trim();if(!me||tgt!==me&&!tgt.includes(me.split(' ')[0].toLowerCase())&&!me.includes(tgt.split(' ')[0]))return;
if(d.type==='like'){var pts=d.pts||1;sc+=pts;updSc();toast('🎉 老师点赞 +'+pts+'分','like');for(let r of rec){if(d.text&&r.text===d.text){r.likes++;r.result='correct';r.pts=(r.pts||0)+pts;break}else if(!d.text){r.likes++;r.result='correct';r.pts=(r.pts||0)+pts;break}}drawRec()}
if(d.type==='comment'){toast('💬 '+d.content,'like');for(let r of rec){if(d.text&&r.text===d.text){r.comment=d.content||'';if(!r.result||r.result==='pending')r.result='revision';break}else if(!d.text){r.comment=d.content||'';if(!r.result||r.result==='pending')r.result='revision';break}}drawRec()}
if(d.type==='revision'){toast('✏️ Please revise and resubmit','like');for(let r of rec){if(d.text&&r.text===d.text){r.result='revision';break}else if(!d.text){r.result='revision';break}}drawRec()}}
function onRpt(d){rptData=d;localStorage.setItem('cp_report',JSON.stringify(d));if(d.gasUrl){GAS_URL=d.gasUrl;localStorage.setItem('cp_gas_url',d.gasUrl)}showRpt(d);if(d.courseware)showCW(d.courseware,d.lesson);toast('📋 收到课后报告！','rpt')}

// ===== Report Tab =====
function showRpt(d){if(!N||!d)return;const me=N.toLowerCase().trim();
let ms=null;for(const[n,s]of Object.entries(d.studentStats||{})){if(n.toLowerCase().trim()===me||n.toLowerCase().includes(me.split(' ')[0].toLowerCase())){ms=s;break}}
let rank='-',total=0;(d.scores||[]).forEach((s,i)=>{const sn=s.name.toLowerCase();if(sn===me||sn.includes(me.split(' ')[0].toLowerCase())){rank=i+1;total=s.total}});
document.getElementById('nr').style.display='none';document.getElementById('rb').style.display='block';
document.getElementById('rL').textContent=d.lesson||'';document.getElementById('rS').textContent=total;
// rank hidden for privacydocument.getElementById('rD').textContent=d.date||'';
if(ms){document.getElementById('sC').textContent=ms.correct;document.getElementById('sW').textContent=ms.wrong;
const rate=ms.total>0?Math.round(ms.correct/ms.total*100):0;document.getElementById('sP').textContent=rate+'%';
if(ms.errors&&ms.errors.length>0){document.getElementById('eS').style.display='block';document.getElementById('eN').textContent=ms.errors.length;
let h='';ms.errors.forEach(e=>{h+='<div class="err-card"><div style="font-size:13px">我的: <span style="color:#991b1b;text-decoration:line-through">'+esc(e.text)+'</span></div><div style="color:#10b981;font-weight:600;font-size:13px;margin-top:4px">✅ '+esc(e.answer)+'</div></div>'});
document.getElementById('eL').innerHTML=h}}
const ex=d.aiExercises||[];if(ex.length>0){document.getElementById('xS').style.display='block';document.getElementById('xN').textContent=ex.length;
let h='';ex.forEach((e,ei)=>{
h+='<div class="ex-card" id="ex_'+ei+'_w"><div style="font-size:11px;color:#3b82f6;font-weight:600">'+esc(e.type||'')+'</div><div style="font-size:14px;font-weight:500;margin-top:2px">'+esc(e.question)+'</div>'+(e.hint?'<div style="font-size:11px;color:#888;margin-top:2px">💡 '+esc(e.hint)+'</div>':'')+'<div style="margin-top:8px"><input id="ex_'+ei+'" placeholder="输入你的答案..." style="width:100%;padding:8px;border:2px solid #e5e7eb;border-radius:8px;font-size:14px"><button onclick="chkEx('+ei+',\''+esc(e.answer).replace(/'/g,"\\'")+'\')" style="margin-top:6px;padding:6px 16px;border-radius:8px;border:none;background:#3b82f6;color:#fff;font-weight:600;cursor:pointer;font-size:13px">提交</button></div><div id="ex_'+ei+'_r" style="margin-top:6px;font-weight:600;font-size:13px"></div></div>'});
h+='<button onclick="submitExResults()" style="width:100%;padding:12px;margin-top:14px;border-radius:10px;border:none;background:#6366f1;color:#fff;font-weight:700;cursor:pointer;font-size:14px">📤 提交练习结果给老师</button>';
document.getElementById('xL').innerHTML=h}}

// ===== Courseware Tab =====
let cwData=null;
function showCW(cw,lesson){
    cwData=cw;

// TF check
function chkTF(ti,qi,ans){
    const tf=cwData.teach_text[ti].tf[qi];const el=document.getElementById('tf_'+ti+'_'+qi);
    tfResults.total++;
    if(ans===tf.answer){el.textContent='✅ 正确！';el.style.color='#10b981';tfResults.correct++}
    else{el.textContent='❌ 答案是'+(tf.answer?'对 True':'错 False');el.style.color='#ef4444';tfResults.errors.push({question:tf.q,picked:ans?'对':'错',answer:tf.answer?'对':'错'})}
    document.getElementById('tf_'+ti+'_'+qi+'_w').querySelectorAll('.tf-btn').forEach(b=>b.disabled=true);
}
// Quiz check
function chkQ(i,btn,pick,ans){
    const el=document.getElementById('qz_'+i);const wrap=document.getElementById('qz_'+i+'_w');
    quizResults.total++;
    if(pick===ans){el.textContent='✅ 正确！';el.style.color='#10b981';btn.style.background='#dcfce7';btn.style.borderColor='#10b981';quizResults.correct++}
    else{el.textContent='❌ 答案: '+ans;el.style.color='#ef4444';btn.style.background='#fee2e2';btn.style.borderColor='#ef4444';quizResults.errors.push({question:'Q'+(i+1),picked:pick,answer:ans})}
    wrap.querySelectorAll('button').forEach(b=>{b.disabled=true;if(b.textContent===ans){b.style.background='#dcfce7';b.style.borderColor='#10b981'}});
}

function submitToSheet(exerciseType, total, correct, errors) {
    if(!GAS_URL) { toast('⚠️ 暂无数据回传地址，等老师发送报告后自动获取','like'); return; }
    const payload = {
        studentName: N,
        lesson: rptData ? rptData.lesson : '',
        exerciseType,
        total,
        correct,
        errors,
        timestamp: new Date().toLocaleString('zh-CN')
    };
    fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    }).then(() => toast('✅ 已提交给老师！','sent')).catch(() => toast('⚠️ 提交失败，请检查网络','like'));
}

function chkEx(i, correctAns) {
    const inp = document.getElementById('ex_'+i);
    const res = document.getElementById('ex_'+i+'_r');
    const pick = (inp.value||'').trim();
    if(!pick){res.textContent='请先输入答案';res.style.color='#f59e0b';return}

    exResults.total++;
    // 比较答案（去标点空格）
    const norm=s=>(s||'').replace(/[。，！？、\s]/g,'').toLowerCase();
    if(norm(pick)===norm(correctAns)){
        res.textContent='✅ 正确！';res.style.color='#10b981';
        inp.style.borderColor='#10b981';inp.style.background='#f0fdf4';

        inp.style.borderColor='#ef4444';inp.style.background='#fef2f2';
        exResults.errors.push({question:'Q'+(i+1),picked:pick,answer:correctAns});
    }
}

// ===== 答题窗口系统 (Deploy2) =====
let qwTimer = 0, qwInterval = null, qwSubmitted = false, qwMyAnswer = '', qwData = null, qwPhase = 'idle';

function onQW(d) {
    if(d.phase === 'start') {
        qwData = d;
        qwTimer = d.duration || 60;
        qwSubmitted = false;
        qwMyAnswer = '';
        qwPhase = 'answering';
        renderQW();
        document.getElementById('qwOverlay').style.display = 'flex';
        
        // Start countdown
        if(qwInterval) clearInterval(qwInterval);
        qwInterval = setInterval(() => {
            qwTimer--;
            updateQWTimer();
            if(qwTimer <= 0) {
                clearInterval(qwInterval);
                // Auto-submit if not yet submitted
                if(!qwSubmitted && qwMyAnswer) submitQW();
                qwPhase = 'locked';
                updateQWStatus();
            }
        }, 1000);
    }
    
    if(d.phase === 'lock') {
        qwPhase = 'locked';
        if(qwInterval) clearInterval(qwInterval);
        if(!qwSubmitted && qwMyAnswer) submitQW();
        updateQWStatus();
    }
    
    if(d.phase === 'publish') {
        qwPhase = 'published';
        if(qwInterval) clearInterval(qwInterval);
        showQWResult(d);
    }
    
    if(d.phase === 'reset') {
        qwPhase = 'idle';
        document.getElementById('qwOverlay').style.display = 'none';
        if(qwInterval) clearInterval(qwInterval);
    }
}

function updateQWTimer() {
    const el = document.getElementById('qwTimer');
    if(!el) return;
    el.textContent = qwTimer + 's';
    el.className = 'timer ' + (qwTimer <= 5 ? 'warn' : 'normal');
}

function updateQWStatus() {
    const el = document.getElementById('qwStatus');
    const lbl = document.getElementById('qwLabel');
    if(!el) return;
    if(qwPhase === 'locked') {
        el.textContent = '已锁定';
        el.style.background = '#fef3c7';
        el.style.color = '#92400e';
        lbl.textContent = '🔒 等待老师公布答案';
        // Disable inputs
        document.querySelectorAll('#qwBody button, #qwBody textarea').forEach(b => b.disabled = true);
    }
}

function renderQW() {
    const body = document.getElementById('qwBody');
    if(!body || !qwData) return;
    let h = '';
    const t = qwData.questionType;
    
    if(t === 'tf') {
        h += '<div class="qw-question">' + esc(qwData.question) + '</div>';
        h += '<div class="qw-options" style="grid-template-columns:1fr 1fr">';
        h += '<button class="qw-opt" id="qw_true" onclick="selectQW(\'true\')">✓ 对 True</button>';
        h += '<button class="qw-opt" id="qw_false" onclick="selectQW(\'false\')">✗ 错 False</button>';
        h += '</div>';
        h += '<button class="qw-submit" id="qwSubmitBtn" onclick="submitQW()" disabled>提交答案 ✈️</button>';
    }
    
    else if(t === 'choice') {
        h += '<div class="qw-question">' + esc(qwData.sentence || '') + '</div>';
        if(qwData.en_hint) h += '<div class="qw-hint">' + esc(qwData.en_hint) + '</div>';
        h += '<div class="qw-options">';
        var shuffledOpts = (qwData.options || []).slice();
        for(var oi=shuffledOpts.length-1;oi>0;oi--){var oj=Math.floor(Math.random()*(oi+1));var ot=shuffledOpts[oi];shuffledOpts[oi]=shuffledOpts[oj];shuffledOpts[oj]=ot;}
        shuffledOpts.forEach(opt => {
            h += '<button class="qw-opt" onclick="selectQW(\'' + esc(opt).replace(/'/g,"\\'") + '\')">' + esc(opt) + '</button>';
        });
        h += '</div>';
        h += '<button class="qw-submit" id="qwSubmitBtn" onclick="submitQW()" disabled>提交答案 ✈️</button>';
    }
    
    else if(t === 'arrange') {
        h += '<div class="qw-hint">' + esc(qwData.en_hint || 'Arrange into a sentence') + '</div>';
        h += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">';
        var shuffled = (qwData.chunks || []).slice();
        for(var si=shuffled.length-1;si>0;si--){var sj=Math.floor(Math.random()*(si+1));var tmp=shuffled[si];shuffled[si]=shuffled[sj];shuffled[sj]=tmp;}
        shuffled.forEach(ch => {
            h += '<span style="background:#e0e7ff;color:#4338ca;padding:6px 12px;border-radius:8px;font-weight:600;font-size:14px">' + esc(ch) + '</span>';
        });
        h += '</div>';
        h += '<textarea class="qw-input" id="qwInput" placeholder="输入正确的句子..." oninput="qwInputChange(this.value)"></textarea>';
        h += '<button class="qw-submit" id="qwSubmitBtn" onclick="submitQW()" disabled>提交答案 ✈️</button>';
    }
    
    else if(t === 'open' || t === 'open_auto') {
        if(qwData.sentence_start) {
            h += '<div class="qw-question">' + esc(qwData.sentence_start) + '___________</div>';
            h += '<div style="display:inline-block;background:#e0e7ff;color:#4338ca;padding:4px 12px;border-radius:15px;font-size:16px;font-weight:700;margin-bottom:10px">🎯 ' + esc(qwData.target_word) + '</div>';
            h += '<div style="font-size:12px;color:#888;margin-bottom:10px">用这个词造句，补全上面的句子</div>';
        } else if(qwData.scenario) {
            h += '<div class="qw-question">' + esc(qwData.scenario) + '</div>';
            if(qwData.en_scenario) h += '<div class="qw-hint">' + esc(qwData.en_scenario) + '</div>';
            if(qwData.question) h += '<div style="font-size:14px;color:#6366f1;font-weight:600;margin-bottom:10px">❓ ' + esc(qwData.question) + '</div>';
        } else if(qwData.hint) {
            h += '<div class="qw-question">' + esc(qwData.hint) + '</div>';
            if(qwData.en_hint) h += '<div class="qw-hint">' + esc(qwData.en_hint) + '</div>';
            if(qwData.keywords) h += '<div style="margin-bottom:10px">' + qwData.keywords.map(k => '<span style="background:#dcfce7;color:#166534;padding:2px 8px;border-radius:6px;font-size:12px;font-weight:600;margin-right:4px">' + esc(k) + '</span>').join('') + '</div>';
        } else if(qwData.text) {
            h += '<div class="qw-question" style="font-size:16px;line-height:1.8">' + esc(qwData.text) + '</div>';
            if(qwData.en) h += '<div class="qw-hint">' + esc(qwData.en) + '</div>';
        }
        h += '<textarea class="qw-input" id="qwInput" placeholder="用中文回答..." oninput="qwInputChange(this.value)"></textarea>';
        h += '<button class="qw-submit" id="qwSubmitBtn" onclick="submitQW()" disabled>提交答案 ✈️</button>';
    }
    
    h += '<div id="qwResult"></div>';
    body.innerHTML = h;
    updateQWTimer();
}

function selectQW(val) {
    qwMyAnswer = val;
    // Update UI
    document.querySelectorAll('#qwBody .qw-opt').forEach(b => {
        b.className = 'qw-opt' + (b.textContent.includes(val) || 
            (val === 'true' && b.id === 'qw_true') || 
            (val === 'false' && b.id === 'qw_false') ? ' selected' : '');
    });
    const btn = document.getElementById('qwSubmitBtn');
    if(btn) btn.disabled = false;
}

function qwInputChange(val) {
    qwMyAnswer = val.trim();
    const btn = document.getElementById('qwSubmitBtn');
    if(btn) btn.disabled = !qwMyAnswer;
}

function submitQW() {
    if(!qwMyAnswer || !cl || !N) return;
    qwSubmitted = true;
    const tm = new Date().toLocaleTimeString('zh-CN',{hour12:false});
    cl.publish(CA, JSON.stringify({name:N, text:qwMyAnswer, time:tm}));
    
    // Add to local records
    if(!rec.find(r=>r.text===qwMyAnswer && r.time===tm)){
        rec.unshift({text:qwMyAnswer, time:tm, likes:0, comment:'', result:'pending', pts:0});
    }
    drawRec();
    
    // 主观题（open类型且非open_auto）：提交后自动关闭弹窗，等老师在互动墙批改
    if(qwData && (qwData.questionType === 'open')) {
        toast('✅ 已提交，等待老师批改','sent');
        setTimeout(function(){
            document.getElementById('qwOverlay').style.display = 'none';
            qwPhase = 'idle';
        }, 800);
        return;
    }
    
    // 客观题：保持弹窗，允许重交
    const btn = document.getElementById('qwSubmitBtn');
    if(btn) { btn.textContent = '✅ 已提交（可修改重交）'; btn.style.background = '#10b981'; }
    qwSubmitted = false;
}

function showQWResult(d) {
    var resEl = document.getElementById('qwResult');
    if(!resEl) return;
    
    var myName = N.toLowerCase().trim();
    var myResult = null;
    var results = d.results || {};
    for(var nm in results) {
        if(!results.hasOwnProperty(nm)) continue;
        var nmLow = nm.toLowerCase().trim();
        if(nmLow === myName || nmLow.indexOf(myName) >= 0 || myName.indexOf(nmLow) >= 0
           || nmLow.split(' ')[0] === myName.split(' ')[0]
           || nmLow.replace(/[^a-z\u4e00-\u9fff]/g,'') === myName.replace(/[^a-z\u4e00-\u9fff]/g,'')) {
            myResult = results[nm]; break;
        }
    }
    
    var allBtns = document.querySelectorAll('#qwBody .qw-opt, #qwBody .qw-submit');
    for(var i=0;i<allBtns.length;i++) allBtns[i].disabled = true;
    var allTas = document.querySelectorAll('#qwBody textarea');
    for(var i=0;i<allTas.length;i++) allTas[i].disabled = true;
    
    if(qwData && (qwData.questionType === 'choice' || qwData.questionType === 'tf')) {
        var opts = document.querySelectorAll('#qwBody .qw-opt');
        for(var i=0;i<opts.length;i++){
            var b = opts[i];
            var optVal = b.id === 'qw_true' ? 'true' : b.id === 'qw_false' ? 'false' : b.textContent.trim();
            if(optVal === d.correctAnswer) b.className = 'qw-opt correct';
            else if(b.classList.contains('selected')) b.className = 'qw-opt wrong';
        }
    }
    
    var h = '';
    if(myResult) {
        if(myResult.correct === true) {
            var ptsText = myResult.pts ? ' +' + myResult.pts + '分' : '';
            var rankText = myResult.rank ? ' (第' + myResult.rank + '名答对)' : '';
            h += '<div class="qw-result correct">🎉 回答正确！' + ptsText + rankText + '</div>';
            if(myResult.pts) { sc += myResult.pts; updSc(); }
        } else if(myResult.correct === false) {
            h += '<div class="qw-result wrong">❌ 答错了</div>';
            if(d.correctAnswer) h += '<div style="font-size:14px;color:#991b1b;margin-top:6px">参考: ' + esc(d.correctAnswer) + '</div>';
        } else {
            h += '<div class="qw-result pending">📝 老师审核中...</div>';
        }
    } else if(!qwMyAnswer) {
        h += '<div class="qw-result wrong">⏰ 未提交</div>';
        if(d.correctAnswer) h += '<div style="font-size:14px;color:#991b1b;margin-top:6px">参考: ' + esc(d.correctAnswer) + '</div>';
    }
    
    // Update homepage record with result and pts
    if(rec.length>0 && qwMyAnswer){
        for(var ri=0;ri<rec.length;ri++){
            if(rec[ri].text===qwMyAnswer){
                if(myResult){
                    rec[ri].result=myResult.correct===true?'correct':myResult.correct===false?'wrong':'pending';
                    rec[ri].pts=myResult.pts||0;
                    rec[ri].rank=myResult.rank||0;
                }
                else if(!qwMyAnswer){rec[ri].result='missed'}
                break;
            }
        }
        drawRec();
    }
    
    // Close button
    h += '<button id="qwCloseBtn" style="width:100%;padding:14px;margin-top:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-weight:700;cursor:pointer;font-size:15px">✕ 关闭 Close</button>';
    
    // Scoreboard
    var scores = d.scores || [];
    if(scores.length > 0) {
        h += '<div style="margin-top:10px"><button id="qwScoreBtn" style="width:100%;padding:10px;border-radius:12px;border:2px solid #6366f1;background:#eff6ff;color:#4338ca;font-weight:700;cursor:pointer;font-size:13px">📊 View Scoreboard</button>';
        h += '<div id="qwScoreList" style="display:none;margin-top:6px"><div class="stu-scores"><div class="stu-scores-hdr"><span>📊 Score Board</span><span>Pts</span></div>';
        for(var si=0;si<scores.length;si++){
            var s=scores[si];
            var isMe=s.name.toLowerCase().trim()===myName||s.name.toLowerCase().indexOf(myName.split(' ')[0].toLowerCase())>=0;
            var medal=si<3?['🥇','🥈','🥉'][si]:(si+1);
            h+='<div class="stu-score-row'+(isMe?' me':'')+'"><span class="rank">'+medal+'</span><span>'+esc(s.name)+(isMe?' ⬅':'')+'</span><span class="pts">'+s.total+'</span></div>';
        }
        h+='</div></div></div>';
    }
    
    resEl.innerHTML = h;
    // Also update homepage scoreboard
    updateHomeScoreboard(scores);
    
    // Attach event listeners via JS (avoids innerHTML escaping issues!)
    var closeBtn = document.getElementById('qwCloseBtn');
    if(closeBtn) closeBtn.addEventListener('click', function(){ document.getElementById('qwOverlay').style.display='none'; });
    var scoreBtn = document.getElementById('qwScoreBtn');
    if(scoreBtn) scoreBtn.addEventListener('click', function(){ var el=document.getElementById('qwScoreList'); el.style.display=el.style.display==='none'?'block':'none'; });
    
    var lbl = document.getElementById('qwLabel');
    var st2 = document.getElementById('qwStatus');
    if(lbl) lbl.textContent = '📢 答案已公布';
    if(st2) { st2.textContent = '已公布'; st2.style.background = '#dcfce7'; st2.style.color = '#166534'; }
}

function toast(m,t){const c=document.getElementById('tc2'),e=document.createElement('div');e.className='toast '+t;e.textContent=m;c.appendChild(e);setTimeout(()=>{e.style.opacity='0';e.style.transition='opacity .3s';setTimeout(()=>e.remove(),300)},3000)}
</script>
</body>
</html>
