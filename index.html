<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ClassPro · 学生端</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.0/mqtt.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;background:#f0f4f8;min-height:100vh;color:#333}
.hdr{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;padding:14px 20px;text-align:center;position:sticky;top:0;z-index:10}
.hdr h1{font-size:17px;font-weight:700;margin:0}.hdr .sub{font-size:11px;opacity:.8;margin-top:3px}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}.dot.on{background:#4ade80}.dot.off{background:#f87171}
.tabs{display:flex;background:#fff;border-bottom:2px solid #e5e7eb;position:sticky;top:52px;z-index:9}
.tab{flex:1;padding:10px 4px;font-size:12px;font-weight:600;border:none;background:none;cursor:pointer;color:#888;border-bottom:3px solid transparent}
.tab.on{color:#6366f1;border-bottom-color:#6366f1;background:#faf5ff}
.sec{padding:16px 20px;background:#fff;margin-top:6px}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.sel{width:100%;padding:11px 16px;font-size:15px;border:2px solid #e5e7eb;border-radius:12px;background:#f9fafb;appearance:none}
.sel:focus{outline:none;border-color:#6366f1}
.inp{width:100%;padding:12px;font-size:15px;border:2px solid #e5e7eb;border-radius:12px;resize:none;min-height:70px;font-family:inherit}
.inp:focus{outline:none;border-color:#6366f1}
.btn{width:100%;padding:13px;font-size:15px;font-weight:700;border:none;border-radius:12px;cursor:pointer;margin-top:10px;color:#fff;background:linear-gradient(135deg,#6366f1,#8b5cf6)}
.btn:active{transform:scale(.98)}.btn:disabled{opacity:.4}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:100;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.15);animation:tin .3s;max-width:90%}
.toast.like{background:#fef3c7;color:#92400e;border:2px solid #fbbf24}
.toast.sent{background:#dcfce7;color:#166534;border:2px solid #4ade80}
.toast.rpt{background:#f3e8ff;color:#6b21a8;border:2px solid #a78bfa}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(-15px)}to{opacity:1;transform:translateX(-50%)}}
.rec{padding:10px;margin-bottom:8px;background:#f9fafb;border-radius:10px;border-left:4px solid #6366f1}
.empty{text-align:center;color:#9ca3af;padding:25px 0;font-size:13px}
.err-card{padding:12px;margin:8px 0;border-radius:10px;background:#fef2f2;border-left:4px solid #ef4444}
.ex-card{padding:12px;margin:8px 0;border-radius:10px;background:#eff6ff;border-left:4px solid #3b82f6}
.ex-ans{display:none;color:#10b981;font-weight:600;margin-top:6px}.ex-ans.show{display:block}
.abtn{background:#e0e7ff;color:#4338ca;border:none;padding:4px 12px;border-radius:8px;font-size:12px;cursor:pointer;margin-top:6px;font-weight:600}
/* Review tab */
.wcard{background:#fff;border:2px solid #e5e7eb;border-radius:12px;padding:14px;margin:8px 0;cursor:pointer;transition:.2s}
.wcard:active{border-color:#6366f1;background:#faf5ff}
.wcard .w{font-size:24px;font-weight:700}.wcard .py{font-size:13px;color:#888}.wcard .en{font-size:12px;color:#666}
.wdetail{background:#f9fafb;border-radius:10px;padding:12px;margin-top:8px}
.wex{padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.wex .cn{font-weight:500}.wex .enn{font-size:12px;color:#888;font-style:italic}
.gstep{padding:10px;margin:6px 0;border-radius:8px;border-left:3px solid #e5e7eb}
.gstep.reveal{border-color:#f59e0b;background:#fffbeb}
.gstep.example{border-color:#3b82f6;background:#eff6ff}
.gstep.formula{border-color:#10b981;background:#f0fdf4}
.tf-btn{padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:2px solid #e5e7eb;background:#fff;margin:4px}
.tf-btn:disabled{opacity:.5}
.stat-row{display:flex;gap:10px;margin-top:10px}
.stat-box{flex:1;text-align:center;padding:8px;background:#f9fafb;border-radius:8px}
.stat-num{font-size:18px;font-weight:700}.stat-lbl{font-size:10px;color:#888;margin-top:2px}
/* Race games */
.race-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.race-word{padding:12px 8px;border-radius:10px;font-size:15px;font-weight:700;text-align:center;cursor:pointer;border:2px solid #e5e7eb;background:#fff;transition:.2s;user-select:none}
.race-word:active{transform:scale(.95)}
.race-word.sel{border-color:#6366f1;background:#ede9fe;color:#4338ca}
.race-word.matched{border-color:#10b981;background:#d1fae5;color:#065f46;opacity:.5;pointer-events:none}
.race-word.wrong{animation:shake .3s}
@keyframes shake{25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.race-img{width:100%;aspect-ratio:1;border-radius:10px;object-fit:cover;border:2px solid #e5e7eb;cursor:pointer;transition:.2s}
.race-img.sel{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.3)}
.race-img.matched{border-color:#10b981;opacity:.4;pointer-events:none}
.race-timer{font-size:28px;font-weight:900;color:#6366f1;text-align:center;font-family:'Courier New',monospace}
.race-done{text-align:center;padding:20px;background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:14px;margin:12px 0}
</style>
</head>
<body>
<div class="hdr"><h1>📡 ClassPro · 学生端</h1><div class="sub"><span class="dot" id="dot"></span><span id="stxt">连接中...</span></div></div>
<div class="tabs">
<button class="tab on" onclick="stab('a')" id="ta">📡 课堂互动</button>
<button class="tab" onclick="stab('b')" id="tb">📋 课后报告</button>
<button class="tab" onclick="stab('c')" id="tc">📖 复习课件</button>
</div>

<!-- TAB A: Interact -->
<div id="pa">
<div class="sec" style="border-bottom:1px solid #e5e7eb">
<div id="ns"><label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px">👤 选择名字</label>
<select class="sel" id="nm" onchange="onN()"><option value="">请选择...</option>
<option value="Jin jilin">Jin jilin 金继林</option><option value="Andrew">Andrew</option><option value="Rui xiang">Rui xiang 瑞翔</option><option value="Jin rui">Jin rui 金瑞</option><option value="Mo tong">Mo tong 墨桐</option><option value="Qiaodan">Qiaodan 巧丹</option><option value="Jialin">Jialin 嘉林</option><option value="Yue xin">Yue xin 悦心</option><option value="Xin yu">Xin yu 心语</option><option value="Luni make">Luni make 鲁尼马克</option><option value="Vincent">Vincent</option><option value="Musa">Musa 穆萨</option><option value="Eifa">Eifa</option><option value="Wan er">Wan er 婉儿</option><option value="Hongyu">Hongyu 宏宇</option><option value="Luzian">Luzian 鲁子安</option><option value="Issa">Issa</option><option value="Yazan">Yazan</option></select></div>
<div id="nk" style="display:none;margin-top:8px;padding:8px 12px;background:#f0fdf4;border:2px solid #86efac;border-radius:10px;display:none"><span style="font-weight:700;color:#166534">👤 <span id="nd"></span></span> <button onclick="chN()" style="background:none;border:none;color:#888;font-size:11px;cursor:pointer;text-decoration:underline;margin-left:10px">切换</button></div>
</div>
<div class="sec"><h3 style="font-size:13px;color:#888;margin-bottom:8px">✍️ 输入答案</h3><textarea class="inp" id="ip" placeholder="输入答案..."></textarea><button class="btn" id="sb" onclick="send()" disabled>发送 ✈️</button></div>

<!-- 竞速游戏区域 -->
<div id="raceArea" style="display:none">
<div class="sec" id="raceGame" style="padding:16px"></div>
</div>

<!-- 答题弹窗区域 -->
<div id="qArea" style="display:none">
<div class="sec" id="qBox" style="padding:16px;border:2px solid #6366f1;border-radius:14px;margin:6px;background:#faf5ff"></div>
</div>
<div class="sec"><h3 style="font-size:13px;font-weight:600;display:flex;justify-content:space-between"><span>📝 记录</span><span id="sl" style="color:#6366f1">0分</span></h3><div id="rl"><div class="empty">还没有提交</div></div></div>
</div>

<!-- TAB B: Report -->
<div id="pb" style="display:none"><div style="padding:16px 20px">
<div id="nr" class="card" style="text-align:center;padding:35px"><div style="font-size:36px;margin-bottom:8px">📭</div><div style="font-weight:600">还没有课后报告</div><div style="font-size:12px;color:#888;margin-top:4px">老师下课时会发送</div></div>
<div id="rb" style="display:none">
<div class="card"><div style="font-size:12px;color:#888" id="rL"></div><div style="display:flex;align-items:center;gap:15px;margin-top:6px"><div style="font-size:32px;font-weight:900;color:#6366f1" id="rS">0</div><div style="font-size:13px;color:#888">分<br><span id="rD"></span></div></div>
<div class="stat-row"><div class="stat-box"><div class="stat-num" id="sC" style="color:#10b981">0</div><div class="stat-lbl">正确</div></div><div class="stat-box"><div class="stat-num" id="sW" style="color:#ef4444">0</div><div class="stat-lbl">错误</div></div><div class="stat-box"><div class="stat-num" id="sP" style="color:#6366f1">0%</div><div class="stat-lbl">正确率</div></div></div></div>
<div class="card" id="eS" style="display:none"><h3 style="font-size:14px;margin-bottom:8px">❌ 我的错题 (<span id="eN">0</span>)</h3><div id="eL"></div></div>
<div class="card" id="xS" style="display:none"><h3 style="font-size:14px;margin-bottom:8px">🎯 针对性练习 (<span id="xN">0</span>)</h3><div style="font-size:11px;color:#888;margin-bottom:8px">根据你的课堂错题，老师为你准备的专项练习</div><div id="xL"></div></div>
</div></div></div>

<!-- TAB C: Review Courseware -->
<div id="pc" style="display:none"><div style="padding:16px 20px">
<div id="ncw" class="card" style="text-align:center;padding:35px"><div style="font-size:36px;margin-bottom:8px">📖</div><div style="font-weight:600">还没有收到课件数据</div><div style="font-size:12px;color:#888;margin-top:4px">老师发送课后报告时会一起发送</div></div>
<div id="cw" style="display:none">
<div style="font-size:16px;font-weight:700;color:#374151;margin-bottom:12px" id="cwTitle"></div>

<!-- Sub-tabs for courseware -->
<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
<button class="abtn" onclick="cwTab('vocab')" id="cwt1" style="background:#6366f1;color:#fff">📖 词汇</button>
<button class="abtn" onclick="cwTab('grammar')" id="cwt2">📐 语法</button>
<button class="abtn" onclick="cwTab('text')" id="cwt3">📝 课文</button>
<button class="abtn" onclick="cwTab('quiz')" id="cwt4">✍️ 自测</button>
</div>

<div id="cwVocab"></div>
<div id="cwGrammar" style="display:none"></div>
<div id="cwText" style="display:none"></div>
<div id="cwQuiz" style="display:none"></div>
</div>
</div></div>

<div id="tc2"></div>
<script>
const MQ='wss://05d1d5baec9d4cb3a21f5517b430cff1.s1.eu.hivemq.cloud:8884/mqtt',MU='classpro',MP='Classpro2026',RM='8888';
// Google Sheet webhook (自动从老师发送的报告中获取)
let GAS_URL = localStorage.getItem('cp_gas_url') || '';

const CA=`classpro/room/${RM}/answers`,CF=`classpro/room/${RM}/feedback`,CR=`classpro/room/${RM}/report`;
let N=localStorage.getItem('classpro_name')||'',cl=null,rec=[],sc=0,rptData=null;

window.onload=()=>{if(N){document.getElementById('nm').value=N;onN()}
const s=localStorage.getItem('cp_report');if(s){try{rptData=JSON.parse(s);showRpt(rptData);if(rptData.courseware)showCW(rptData.courseware,rptData.lesson)}catch(e){}}
connectMQ()};

function stab(t){['a','b','c'].forEach(x=>{document.getElementById('p'+x).style.display=x===t?'block':'none';document.getElementById('t'+x).className='tab'+(x===t?' on':'')})};
function onN(){const s=document.getElementById('nm');N=s.value;if(N){localStorage.setItem('classpro_name',N);document.getElementById('sb').disabled=false;document.getElementById('nk').style.display='block';document.getElementById('nd').textContent=N}else{document.getElementById('sb').disabled=true;document.getElementById('nk').style.display='none'}}
function chN(){document.getElementById('nm').value='';document.getElementById('nk').style.display='none';document.getElementById('sb').disabled=true;N='';localStorage.removeItem('classpro_name')}

function connectMQ(){cl=mqtt.connect(MQ,{username:MU,password:MP,clientId:'s_'+Math.random().toString(16).substr(2,8)});
cl.on('connect',()=>{upSt(true);cl.subscribe(CF);cl.subscribe(CR);cl.subscribe(`classpro/room/${RM}/race`);cl.subscribe(`classpro/room/${RM}/question`)});cl.on('error',()=>upSt(false));cl.on('close',()=>upSt(false));
cl.on('message',(t,m)=>{try{const d=JSON.parse(m.toString());if(t===CF)onFB(d);if(t===CR)onRpt(d);if(t===`classpro/room/${RM}/race`)onRace(d);if(t===`classpro/room/${RM}/question`)onQuestion(d)}catch(e){}})}
function upSt(on){document.getElementById('dot').className='dot '+(on?'on':'off');document.getElementById('stxt').textContent=on?'已连接 · Room '+RM:'未连接'}

function send(){const i=document.getElementById('ip'),tx=i.value.trim();if(!N){N=document.getElementById('nm').value;if(!N){alert('请先选择名字');return}}if(!tx||!cl)return;
const tm=new Date().toLocaleTimeString('zh-CN',{hour12:false});cl.publish(CA,JSON.stringify({name:N,text:tx,time:tm}));i.value='';rec.unshift({text:tx,time:tm,likes:0,comment:''});drawRec();toast('✅ 已发送','sent')}
document.addEventListener('DOMContentLoaded',()=>{document.getElementById('ip').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}})});

function onFB(d){const tgt=(d.targetName||'').toLowerCase().trim(),me=N.toLowerCase().trim();if(!me||tgt!==me&&!tgt.includes(me.split(' ')[0].toLowerCase())&&!me.includes(tgt.split(' ')[0]))return;
if(d.type==='like'){const pts=d.pts||1;sc+=pts;updSc();toast('🎉 '+(d.msg||d.auto?'答对了':'老师点赞')+' +'+pts+'分','like');for(let r of rec){if(d.text&&r.text===d.text){r.likes++;break}else if(!d.text){r.likes++;break}}drawRec()}
if(d.type==='comment'){toast('💬 '+d.content,'like');for(let r of rec){if(d.text&&r.text===d.text){r.comment=d.content||'';break}else if(!d.text){r.comment=d.content||'';break}}drawRec()}}

function onRpt(d){rptData=d;localStorage.setItem('cp_report',JSON.stringify(d));if(d.gasUrl){GAS_URL=d.gasUrl;localStorage.setItem('cp_gas_url',d.gasUrl)}showRpt(d);if(d.courseware)showCW(d.courseware,d.lesson);toast('📋 收到课后报告！','rpt')}

// ===== Report Tab =====
function showRpt(d){if(!N||!d)return;const me=N.toLowerCase().trim();
let ms=null;for(const[n,s]of Object.entries(d.studentStats||{})){if(n.toLowerCase().trim()===me||n.toLowerCase().includes(me.split(' ')[0].toLowerCase())){ms=s;break}}
let rank='-',total=0;(d.scores||[]).forEach((s,i)=>{const sn=s.name.toLowerCase();if(sn===me||sn.includes(me.split(' ')[0].toLowerCase())){rank=i+1;total=s.total}});
document.getElementById('nr').style.display='none';document.getElementById('rb').style.display='block';
document.getElementById('rL').textContent=d.lesson||'';document.getElementById('rS').textContent=total;
// rank hidden for privacydocument.getElementById('rD').textContent=d.date||'';
if(ms){document.getElementById('sC').textContent=ms.correct;document.getElementById('sW').textContent=ms.wrong;
const rate=ms.total>0?Math.round(ms.correct/ms.total*100):0;document.getElementById('sP').textContent=rate+'%';
if(ms.errors&&ms.errors.length>0){document.getElementById('eS').style.display='block';document.getElementById('eN').textContent=ms.errors.length;
let h='';ms.errors.forEach(e=>{h+='<div class="err-card"><div style="font-size:13px">我的: <span style="color:#991b1b;text-decoration:line-through">'+esc(e.text)+'</span></div><div style="color:#10b981;font-weight:600;font-size:13px;margin-top:4px">✅ '+esc(e.answer)+'</div></div>'});
document.getElementById('eL').innerHTML=h}}
const ex=d.aiExercises||[];if(ex.length>0){document.getElementById('xS').style.display='block';document.getElementById('xN').textContent=ex.length;
let h='';ex.forEach((e,ei)=>{
h+='<div class="ex-card" id="ex_'+ei+'_w"><div style="font-size:11px;color:#3b82f6;font-weight:600">'+esc(e.type||'')+'</div><div style="font-size:14px;font-weight:500;margin-top:2px">'+esc(e.question)+'</div>'+(e.hint?'<div style="font-size:11px;color:#888;margin-top:2px">💡 '+esc(e.hint)+'</div>':'')+'<div style="margin-top:8px"><input id="ex_'+ei+'" placeholder="输入你的答案..." style="width:100%;padding:8px;border:2px solid #e5e7eb;border-radius:8px;font-size:14px"><button onclick="chkEx('+ei+',\''+esc(e.answer).replace(/'/g,"\\'")+'\')" style="margin-top:6px;padding:6px 16px;border-radius:8px;border:none;background:#3b82f6;color:#fff;font-weight:600;cursor:pointer;font-size:13px">提交</button></div><div id="ex_'+ei+'_r" style="margin-top:6px;font-weight:600;font-size:13px"></div></div>'});
h+='<button onclick="submitExResults()" style="width:100%;padding:12px;margin-top:14px;border-radius:10px;border:none;background:#6366f1;color:#fff;font-weight:700;cursor:pointer;font-size:14px">📤 提交练习结果给老师</button>';
document.getElementById('xL').innerHTML=h}}

// ===== Courseware Tab =====
let cwData=null;
function showCW(cw,lesson){
    cwData=cw;
    document.getElementById('ncw').style.display='none';document.getElementById('cw').style.display='block';
    document.getElementById('cwTitle').textContent='📖 '+(lesson||'复习课件');
    renderVocab();renderGrammar();renderText();renderQuiz();
}
function cwTab(t){['Vocab','Grammar','Text','Quiz'].forEach((x,i)=>{document.getElementById('cw'+x).style.display=x.toLowerCase()===t?'block':'none';document.getElementById('cwt'+(i+1)).style.background=x.toLowerCase()===t?'#6366f1':'#e0e7ff';document.getElementById('cwt'+(i+1)).style.color=x.toLowerCase()===t?'#fff':'#4338ca'})}

function renderVocab(){
    if(!cwData||!cwData.teach_vocab)return;
    let h='';
    cwData.teach_vocab.forEach(part=>{part.forEach(w=>{
        h+='<div class="wcard" onclick="this.querySelector(\'.wdetail\').style.display=this.querySelector(\'.wdetail\').style.display===\'none\'?\'block\':\'none\'">';
        h+='<div class="w">'+esc(w.word)+'</div><div class="py">'+esc(w.pinyin)+'</div><div class="en">'+esc(w.english)+'</div>';
        h+='<div class="wdetail" style="display:none">';
        if(w.collocations)h+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">'+w.collocations.map(c=>'<span style="background:#e0e7ff;color:#4338ca;padding:2px 8px;border-radius:8px;font-size:11px">'+esc(c)+'</span>').join('')+'</div>';
        if(w.examples)w.examples.forEach(ex=>{h+='<div class="wex"><div class="cn">'+esc(ex.cn)+' <span onclick="event.stopPropagation();speak(\''+esc(ex.cn).replace(/'/g,"\\'")+'\');return false" style="cursor:pointer">🔊</span></div><div class="enn">'+esc(ex.en)+'</div></div>'});
        h+='</div></div>';
    })});
    document.getElementById('cwVocab').innerHTML=h;
}
function renderGrammar(){
    if(!cwData||!cwData.teach_grammar)return;
    let h='';
    cwData.teach_grammar.forEach(g=>{
        h+='<div class="card"><h3 style="font-size:14px;margin-bottom:10px;color:#374151">'+esc(g.title)+'</h3>';
        g.steps.forEach(s=>{
            if(s.type==='reveal')h+='<div class="gstep reveal"><div style="font-style:italic;color:#555">'+esc(s.prompt)+'</div><div style="font-weight:600;color:#1565c0;margin-top:4px">→ '+esc(s.answer)+'</div>'+(s.note?'<div style="font-size:11px;color:#888;margin-top:2px">'+esc(s.note)+'</div>':'')+'</div>';
            if(s.type==='example')h+='<div class="gstep example"><div style="font-weight:500">'+esc(s.cn)+' <span onclick="speak(\''+esc(s.cn).replace(/'/g,"\\'")+'\');return false" style="cursor:pointer">🔊</span></div><div style="font-size:12px;color:#888;font-style:italic">'+esc(s.en)+'</div></div>';
            if(s.type==='formula')h+='<div class="gstep formula"><div style="font-weight:700;font-size:15px;color:#166534">'+esc(s.formula)+'</div>'+(s.note?'<div style="font-size:11px;color:#888;margin-top:3px">'+esc(s.note)+'</div>':'')+'</div>';
        });
        h+='</div>';
    });
    document.getElementById('cwGrammar').innerHTML=h;
}
function renderText(){
    if(!cwData||!cwData.teach_text)return;
    let h='';
    cwData.teach_text.forEach((t,ti)=>{
        h+='<div class="card"><h3 style="font-size:14px;margin-bottom:10px">'+esc(t.title)+'</h3>';
        if(t.lines)t.lines.forEach(l=>{
            h+='<div style="padding:6px 0;border-bottom:1px solid #f0f0f0">'+(l.speaker?'<span style="font-size:11px;color:#6366f1;font-weight:600">'+esc(l.speaker)+'</span> ':'')+'<div style="font-size:15px;font-weight:500;line-height:1.6">'+l.cn+'</div><div style="font-size:12px;color:#888;font-style:italic">'+esc(l.en)+'</div></div>';
        });
        // TF self-test
        if(t.tf&&t.tf.length>0){
            h+='<div style="margin-top:12px;padding-top:10px;border-top:2px dashed #e5e7eb"><div style="font-size:13px;font-weight:600;margin-bottom:8px">🎯 自测判断 True or False</div>';
            t.tf.forEach((q,qi)=>{
                const id='tf_'+ti+'_'+qi;
                h+='<div style="padding:8px 0;border-bottom:1px solid #f8f8f8" id="'+id+'_w"><div style="font-size:14px;margin-bottom:6px">'+esc(q.q)+'</div><button class="tf-btn" onclick="chkTF('+ti+','+qi+',true)">✓ 对</button><button class="tf-btn" onclick="chkTF('+ti+','+qi+',false)">✗ 错</button><span id="'+id+'" style="font-weight:600;margin-left:8px"></span></div>';
            });
            h+='</div>';
        }
        h+='</div>';
    });
    document.getElementById('cwText').innerHTML=h;
}
function renderQuiz(){
    if(!cwData)return;
    let h='';
    
    // Section 1: 完成句子
    const sc=cwData.sentence_completion||[];
    if(sc.length){
        h+='<div class="card"><h4 style="margin:0 0 10px;color:#6366f1">📝 完成句子 ('+sc.length+'题)</h4>';
        sc.forEach((q,i)=>{
            const id='qz_'+i;
            h+='<div style="padding:8px 0;border-bottom:1px solid #f0f0f0" id="'+id+'_w"><div style="font-size:14px;font-weight:500">'+esc(q.sentence||'')+'</div>';
            if(q.en_hint)h+='<div style="font-size:11px;color:#888;font-style:italic;margin-bottom:6px">'+esc(q.en_hint)+'</div>';
            h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">';
            (q.options||[]).forEach(opt=>{h+='<button style="padding:8px;font-size:14px;font-weight:600;border-radius:8px;border:2px solid #e5e7eb;background:#fff;cursor:pointer" onclick="chkQ('+i+',this,\''+esc(opt)+'\',\''+esc(q.answer)+'\')">'+esc(opt)+'</button>'});
            h+='</div><div id="'+id+'" style="font-weight:600;margin-top:4px;font-size:12px"></div></div>';
        });
        h+='</div>';
    }
    
    // Section 2: 连词成句
    const ge=cwData.grammar_exercises||[];
    ge.forEach((gp,gi)=>{
        const dd=gp.drag_drop||[];
        if(dd.length){
            h+='<div class="card"><h4 style="margin:0 0 10px;color:#3b82f6">🧩 连词成句 · '+esc(gp.name)+' ('+dd.length+'题)</h4>';
            dd.forEach((d,di)=>{
                const id='dd_'+gi+'_'+di;
                h+='<div style="padding:8px 0;border-bottom:1px solid #f0f0f0" id="'+id+'_w"><div style="font-size:14px;font-weight:500">'+esc(d.chunks.join(' / '))+'</div>';

                h+='<button class="abtn" onclick="this.nextElementSibling.classList.toggle(\'show\')">查看答案</button><div class="ex-ans">✅ '+esc(d.correct_answer)+'</div></div>';
            });
            h+='</div>';
        }
        
        // 看图造句
        const ps=gp.picture_sentence||[];
        if(ps.length){
            h+='<div class="card"><h4 style="margin:0 0 10px;color:#10b981">🖼️ 看图造句 · '+esc(gp.name)+' ('+ps.length+'题)</h4>';
            ps.forEach(p=>{
                h+='<div style="padding:8px 0;border-bottom:1px solid #f0f0f0"><div style="font-size:14px;font-weight:500">'+esc(p.hint)+'</div>';
                if(p.en_hint)h+='<div style="font-size:11px;color:#888;font-style:italic">'+esc(p.en_hint)+'</div>';
                if(p.keywords)h+='<div style="margin-top:4px">'+p.keywords.map(k=>'<span style="background:#dcfce7;color:#166534;padding:1px 6px;border-radius:6px;font-size:11px;font-weight:600;margin-right:4px">'+esc(k)+'</span>').join('')+'</div>';
                h+='<button class="abtn" onclick="this.nextElementSibling.classList.toggle(\'show\')">查看参考</button><div class="ex-ans">✅ '+esc(p.reference_answer)+'</div></div>';
            });
            h+='</div>';
        }
        
        // 情境挑战
        const sc2=gp.scenario||[];
        if(sc2.length){
            h+='<div class="card"><h4 style="margin:0 0 10px;color:#f59e0b">💡 情境挑战 · '+esc(gp.name)+' ('+sc2.length+'题)</h4>';
            sc2.forEach(s=>{
                h+='<div style="padding:8px 0;border-bottom:1px solid #f0f0f0"><div style="font-size:14px;font-weight:500">'+esc(s.scenario)+'</div>';
                if(s.en_scenario)h+='<div style="font-size:11px;color:#888;font-style:italic">'+esc(s.en_scenario)+'</div>';
                if(s.question)h+='<div style="font-size:13px;color:#6366f1;font-weight:600;margin-top:4px">❓ '+esc(s.question)+'</div>';
                h+='<button class="abtn" onclick="this.nextElementSibling.classList.toggle(\'show\')">查看参考</button><div class="ex-ans">✅ '+esc(s.reference)+'</div></div>';
            });

        }
    });
    
    // Section: 挖空复述
    const clz=cwData.cloze||[];
    if(clz.length){
        h+='<div class="card"><h4 style="margin:0 0 10px;color:#8b5cf6">📝 挖空复述 ('+clz.length+'题)</h4>';
        clz.forEach((cl2,ci)=>{

        });

    }
    
    if(!h){document.getElementById('cwQuiz').innerHTML='<div class="empty">暂无自测题</div>';return}
    h+='<button onclick="submitToSheet(\'自测练习\',quizResults.total,quizResults.correct,quizResults.errors)" style="width:100%;padding:12px;margin-top:14px;border-radius:10px;border:none;background:#6366f1;color:#fff;font-weight:700;cursor:pointer;font-size:14px">📤 提交练习结果给老师</button>';
    document.getElementById('cwQuiz').innerHTML=h;
}

// TF check
function chkTF(ti,qi,ans){
    const tf=cwData.teach_text[ti].tf[qi];const el=document.getElementById('tf_'+ti+'_'+qi);
    tfResults.total++;
    if(ans===tf.answer){el.textContent='✅ 正确！';el.style.color='#10b981';tfResults.correct++}
    else{el.textContent='❌ 答案是'+(tf.answer?'对 True':'错 False');el.style.color='#ef4444';tfResults.errors.push({question:tf.q,picked:ans?'对':'错',answer:tf.answer?'对':'错'})}
    document.getElementById('tf_'+ti+'_'+qi+'_w').querySelectorAll('.tf-btn').forEach(b=>b.disabled=true);
}
// Quiz check
function chkQ(i,btn,pick,ans){
    const el=document.getElementById('qz_'+i);const wrap=document.getElementById('qz_'+i+'_w');
    quizResults.total++;
    if(pick===ans){el.textContent='✅ 正确！';el.style.color='#10b981';btn.style.background='#dcfce7';btn.style.borderColor='#10b981';quizResults.correct++}
    else{el.textContent='❌ 答案: '+ans;el.style.color='#ef4444';btn.style.background='#fee2e2';btn.style.borderColor='#ef4444';quizResults.errors.push({question:'Q'+(i+1),picked:pick,answer:ans})}
    wrap.querySelectorAll('button').forEach(b=>{b.disabled=true;if(b.textContent===ans){b.style.background='#dcfce7';b.style.borderColor='#10b981'}});
}

// ===== 提交练习结果到 Google Sheet =====
function submitToSheet(exerciseType, total, correct, errors) {
    if(!GAS_URL) { toast('⚠️ 暂无数据回传地址，等老师发送报告后自动获取','like'); return; }
    const payload = {
        studentName: N,
        lesson: rptData ? rptData.lesson : '',
        exerciseType,
        total,
        correct,
        errors,
        timestamp: new Date().toLocaleString('zh-CN')
    };
    fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    }).then(() => toast('✅ 已提交给老师！','sent')).catch(() => toast('⚠️ 提交失败，请检查网络','like'));
}

// Targeted Exercise check + tracking
let exResults = {total:0, correct:0, errors:[]};
function chkEx(i, correctAns) {
    const inp = document.getElementById('ex_'+i);
    const res = document.getElementById('ex_'+i+'_r');
    const pick = (inp.value||'').trim();
    if(!pick){res.textContent='请先输入答案';res.style.color='#f59e0b';return}
    inp.disabled=true;
    inp.parentElement.querySelector('button').disabled=true;
    exResults.total++;
    // 比较答案（去标点空格）
    const norm=s=>(s||'').replace(/[。，！？、\s]/g,'').toLowerCase();
    if(norm(pick)===norm(correctAns)){
        res.textContent='✅ 正确！';res.style.color='#10b981';
        inp.style.borderColor='#10b981';inp.style.background='#f0fdf4';
        exResults.correct++;
    } else {
        res.innerHTML='❌ 参考答案: '+esc(correctAns);res.style.color='#ef4444';
        inp.style.borderColor='#ef4444';inp.style.background='#fef2f2';
        exResults.errors.push({question:'Q'+(i+1),picked:pick,answer:correctAns});
    }
}
function submitExResults(){
    submitToSheet('针对性加练',exResults.total,exResults.correct,exResults.errors);
}

// ===== 竞速游戏系统 =====
let raceTimer = null;
let raceStart = 0;
let raceType = '';

function onRace(d) {
    if(d.phase === 'start') {
        // 隐藏答题弹窗
        document.getElementById('qArea').style.display = 'none';
        if(raceTimer) { clearInterval(raceTimer); raceTimer = null; }
        raceType = d.type;
        if(d.type === 'v7') startV7Race(d.pairs);
        if(d.type === 'v8') startV8Race(d.words);
    }
    if(d.phase === 'end') {
        if(raceTimer) { clearInterval(raceTimer); raceTimer = null; }
        endRaceDisplay(d.rankings || []);
    }
}

// --- V7: 词了个词 (左右两栏配对) ---
function startV7Race(pairs) {
    document.getElementById('raceArea').style.display = 'block';
    const el = document.getElementById('raceGame');
    // 分别打散A栏和B栏
    const colA = pairs.map((p, i) => ({ text: p.word_a, pairId: i }));
    const colB = pairs.map((p, i) => ({ text: p.word_b, pairId: i }));
    for(let i = colA.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [colA[i],colA[j]]=[colA[j],colA[i]]; }
    for(let i = colB.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [colB[i],colB[j]]=[colB[j],colB[i]]; }
    
    let selA = null, selB = null, matchCount = 0;
    const total = pairs.length;
    raceStart = Date.now();
    if(raceTimer) clearInterval(raceTimer);
    
    let h = '<div style="text-align:center;margin-bottom:10px"><div style="font-size:15px;font-weight:700;color:#e65100">🔗 词了个词 · 左右搭配</div><div class="race-timer" id="raceTime">0.0s</div><div style="font-size:12px;color:#888" id="raceProgress">0 / '+total+'</div></div>';
    h += '<div style="display:flex;gap:10px">';
    // A栏
    h += '<div style="flex:1" id="v7ColA">';
    h += '<div style="font-size:11px;color:#e65100;text-align:center;font-weight:700;margin-bottom:6px">A 栏</div>';
    colA.forEach((w, i) => {
        h += '<div class="race-word" id="v7a_'+i+'" data-pair="'+w.pairId+'" data-col="a" style="margin:4px 0;padding:12px;font-size:16px;border-color:#ffcc80">'+esc(w.text)+'</div>';
    });
    h += '</div>';
    // B栏
    h += '<div style="flex:1" id="v7ColB">';
    h += '<div style="font-size:11px;color:#1565c0;text-align:center;font-weight:700;margin-bottom:6px">B 栏</div>';
    colB.forEach((w, i) => {
        h += '<div class="race-word" id="v7b_'+i+'" data-pair="'+w.pairId+'" data-col="b" style="margin:4px 0;padding:12px;font-size:16px;border-color:#90caf9">'+esc(w.text)+'</div>';
    });
    h += '</div></div>';
    el.innerHTML = h;
    
    raceTimer = setInterval(() => {
        const te = document.getElementById('raceTime');
        if(te) te.textContent = ((Date.now()-raceStart)/1000).toFixed(1)+'s';
    }, 100);
    
    function clearSelA() { document.querySelectorAll('#v7ColA .race-word.sel').forEach(c => c.classList.remove('sel')); selA = null; }
    function clearSelB() { document.querySelectorAll('#v7ColB .race-word.sel').forEach(c => c.classList.remove('sel')); selB = null; }
    
    function tryMatch() {
        if(!selA || !selB) return;
        if(selA.pair === selB.pair) {
            selA.el.classList.remove('sel'); selA.el.classList.add('matched');
            selB.el.classList.remove('sel'); selB.el.classList.add('matched');
            matchCount++;
            document.getElementById('raceProgress').textContent = matchCount+' / '+total;
            if(matchCount >= total) {
                clearInterval(raceTimer);
                submitRaceResult('v7', ((Date.now()-raceStart)/1000).toFixed(1));
            }
        } else {
            selA.el.classList.add('wrong'); selB.el.classList.add('wrong');
            const a=selA.el, b=selB.el;
            setTimeout(() => { a.classList.remove('wrong','sel'); b.classList.remove('wrong','sel'); }, 300);
        }
        selA = null; selB = null;
    }
    
    // A栏点击
    document.getElementById('v7ColA').addEventListener('click', function(e) {
        const card = e.target.closest('.race-word');
        if(!card || card.classList.contains('matched')) return;
        clearSelA();
        card.classList.add('sel');
        selA = { el: card, pair: parseInt(card.dataset.pair) };
        tryMatch();
    });
    // B栏点击
    document.getElementById('v7ColB').addEventListener('click', function(e) {
        const card = e.target.closest('.race-word');
        if(!card || card.classList.contains('matched')) return;
        clearSelB();
        card.classList.add('sel');
        selB = { el: card, pair: parseInt(card.dataset.pair) };
        tryMatch();
    });
    
    toast('🔗 词了个词开始！从A栏和B栏各选一个搭配！', 'like');
    document.getElementById('raceArea').scrollIntoView({ behavior: 'smooth' });
}

// --- V8: 词汇消消乐 (网格中英配对) ---
function startV8Race(words) {
    document.getElementById('raceArea').style.display = 'block';
    const el = document.getElementById('raceGame');
    const cards = [];
    words.forEach((w, i) => {
        cards.push({ text: w.word, pairId: i, type: 'cn' });
        cards.push({ text: w.en_hint || w.word, pairId: i, type: 'en' });
    });
    for(let i = cards.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [cards[i],cards[j]]=[cards[j],cards[i]]; }

    let selected = null, matchCount = 0;
    const total = words.length;
    const cols = cards.length <= 16 ? 4 : 5;
    raceStart = Date.now();
    if(raceTimer) clearInterval(raceTimer);

    let h = '<div style="text-align:center;margin-bottom:10px">';
    h += '<div style="font-size:15px;font-weight:700;color:#10b981">🎯 词汇消消乐 · 找出中英配对</div>';
    h += '<div class="race-timer" id="raceTime" style="color:#10b981">0.0s</div>';
    h += '<div style="font-size:12px;color:#888" id="raceProgress">0 / '+total+'</div></div>';
    h += '<div style="display:grid;grid-template-columns:repeat('+cols+',1fr);gap:4px;max-width:100%" id="v8Grid">';
    cards.forEach((c, i) => {
        const isCN = c.type === 'cn';
        const bg = isCN ? '#fef3c7' : '#dbeafe';
        const border = isCN ? '#f59e0b' : '#3b82f6';
        const color = isCN ? '#92400e' : '#1e40af';
        const fs = isCN ? '22px' : '14px';
        h += '<div class="race-word" id="v8g_'+i+'" data-idx="'+i+'" data-pair="'+c.pairId+'" data-type="'+c.type+'" style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:4px;font-size:'+fs+';background:'+bg+';border-color:'+border+';color:'+color+';line-height:1.2;word-break:break-word;font-weight:800">'+esc(c.text)+'</div>';
    });
    h += '</div>';
    el.innerHTML = h;

    raceTimer = setInterval(() => {
        const te = document.getElementById('raceTime');
        if(te) te.textContent = ((Date.now()-raceStart)/1000).toFixed(1)+'s';
    }, 100);

    document.getElementById('v8Grid').addEventListener('click', function(e) {
        const card = e.target.closest('.race-word');
        if(!card || card.style.visibility==='hidden') return;
        const idx = parseInt(card.dataset.idx);

        if(!selected) {
            selected = { el: card, pair: parseInt(card.dataset.pair), type: card.dataset.type, idx };
            card.classList.add('sel');
        } else if(selected.idx === idx) {
            card.classList.remove('sel');
            selected = null;
        } else {
            const pA = selected.pair, pB = parseInt(card.dataset.pair);
            const tA = selected.type, tB = card.dataset.type;
            if(pA === pB && tA !== tB) {
                selected.el.classList.remove('sel');
                selected.el.style.transition='opacity .3s,transform .3s';
                card.style.transition='opacity .3s,transform .3s';
                selected.el.style.opacity='0';selected.el.style.transform='scale(0.5)';
                card.style.opacity='0';card.style.transform='scale(0.5)';
                const a=selected.el,b=card;
                setTimeout(()=>{a.style.visibility='hidden';b.style.visibility='hidden';a.style.pointerEvents='none';b.style.pointerEvents='none'},350);
                matchCount++;
                document.getElementById('raceProgress').textContent = matchCount+' / '+total;
                if(matchCount >= total) {
                    clearInterval(raceTimer);
                    submitRaceResult('v8', ((Date.now()-raceStart)/1000).toFixed(1));
                }
            } else {
                selected.el.classList.add('wrong');
                card.classList.add('wrong');
                const prev = selected.el;
                setTimeout(() => { prev.classList.remove('wrong','sel'); card.classList.remove('wrong'); }, 300);
            }
            selected = null;
        }
    });

    toast('🎯 消消乐开始！点两张卡配对（中+英）！','like');
    document.getElementById('raceArea').scrollIntoView({behavior:'smooth'});
}

// --- 提交竞速结果 ---
function submitRaceResult(type, time) {
    if(!cl || !N) return;
    cl.publish(`classpro/room/${RM}/race_result`, JSON.stringify({
        name: N, raceType: type, time: parseFloat(time)
    }));
    const el = document.getElementById('raceGame');
    el.innerHTML += '<div class="race-done"><div style="font-size:36px">🎉</div><div style="font-size:20px;font-weight:900;color:#92400e;margin:8px 0">' + time + '秒</div><div style="font-size:13px;color:#78350f">完成！等待其他同学...</div></div>';
    toast('🎉 完成！用时 ' + time + ' 秒', 'sent');
}

// --- 结束竞速显示 ---
function endRaceDisplay(rankings) {
    if(raceTimer) clearInterval(raceTimer);
    const el = document.getElementById('raceGame');
    if(!el || !rankings.length) { document.getElementById('raceArea').style.display = 'none'; return; }
    let h = '<div style="text-align:center;margin-bottom:10px"><div style="font-size:16px;font-weight:700;color:#e65100">🏆 最终排名</div></div>';
    const me = N.toLowerCase().trim();
    rankings.forEach((r, i) => {
        const isMe = r.name.toLowerCase().trim() === me || r.name.toLowerCase().includes(me.split(' ')[0].toLowerCase());
        h += '<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;margin:4px 0;' + (isMe ? 'background:#ede9fe;border:2px solid #8b5cf6' : 'background:#f9fafb') + '"><div style="font-size:16px;font-weight:900;min-width:28px;text-align:center">' + (i < 3 ? ['🥇','🥈','🥉'][i] : (i+1)) + '</div><div style="flex:1;font-weight:600">' + esc(r.name) + (isMe ? ' ⭐' : '') + '</div><div style="font-weight:800;color:#e65100">' + r.time + 's</div></div>';
    });
    el.innerHTML = h;
}

// ===== 答题窗口系统（question频道） =====
let qwSent = false; // 当前题是否已提交

function onQuestion(d) {
    if(d.phase === 'start') {
        // 隐藏竞速区域并清空内容
        document.getElementById('raceArea').style.display = 'none';
        document.getElementById('raceGame').innerHTML = '';
        if(raceTimer) { clearInterval(raceTimer); raceTimer = null; }
        qwSent = false;
        showQuestionUI(d);
    } else if(d.phase === 'publish') {
        showQuestionResult(d);
    } else if(d.phase === 'reset') {
        document.getElementById('qArea').style.display = 'none';
        // 同时也清除竞速区域（如有残留）
        document.getElementById('raceArea').style.display = 'none';
        document.getElementById('raceGame').innerHTML = '';
    }
}

function showQuestionUI(d) {
    const box = document.getElementById('qBox');
    const area = document.getElementById('qArea');
    area.style.display = 'block';

    const duration = d.duration || 0;
    let h = '<div style="text-align:center;margin-bottom:10px">';
    h += '<div style="font-size:13px;font-weight:700;color:#6366f1">📝 答题中</div>';
    h += '<div id="qTimer" style="font-size:24px;font-weight:900;color:#6366f1">' + (duration || '') + '</div>';
    h += '</div>';

    // 根据题型显示题目内容
    const st = d.type || '';
    if(d.questionType === 'vocab_desc') {
        // v6 描述猜词
        h += '<div style="font-size:13px;color:#9c27b0;font-weight:700;margin-bottom:6px">🔍 描述猜词</div>';
        h += '<div style="font-size:18px;font-weight:600;padding:12px;background:#f3e8ff;border-radius:10px;margin-bottom:10px">' + esc(d.description || '') + '</div>';
    } else if(st === 'v4') {
        h += '<div style="font-size:13px;color:#6366f1;font-weight:700;margin-bottom:6px">📝 完成句子</div>';
        const sentHtml = (d.sentence||'').replace(/___+/g, '<span style="border-bottom:2px solid #6366f1;padding:0 10px">&nbsp;&nbsp;&nbsp;&nbsp;</span>');
        h += '<div style="font-size:16px;font-weight:600;padding:12px;background:#eff6ff;border-radius:10px;margin-bottom:6px">' + sentHtml + '</div>';
        if(d.target_word) h += '<div style="display:inline-block;background:#e0e7ff;color:#4338ca;padding:4px 12px;border-radius:16px;font-size:14px;font-weight:700;margin-bottom:10px">🎯 ' + esc(d.target_word) + '</div>';
    } else if(st === 'v5') {
        h += '<div style="font-size:13px;color:#6366f1;font-weight:700;margin-bottom:6px">✏️ 生词造句</div>';
        if(d.sentence) h += '<div style="font-size:16px;font-weight:600;padding:12px;background:#eff6ff;border-radius:10px;margin-bottom:10px">' + esc(d.sentence).replace(/___+/g, '<span style="border-bottom:2px solid #6366f1;padding:0 10px">&nbsp;&nbsp;&nbsp;</span>') + '</div>';
        if(d.options && d.options.length) {
            h += '<div id="v5Opts" style="display:flex;flex-direction:column;gap:8px;margin-bottom:10px">';
            d.options.forEach(opt => {
                h += '<button onclick="pickV5Option(this,\'' + esc(opt).replace(/'/g,"\\'") + '\')" style="padding:14px;font-size:16px;font-weight:600;border-radius:12px;border:2px solid #e5e7eb;background:#fff;cursor:pointer;text-align:center">' + esc(opt) + '</button>';
            });
            h += '</div>';
        }
    } else if(d.questionType === 'arrange') {
        h += '<div style="font-size:13px;color:#6366f1;font-weight:700;margin-bottom:6px">🧩 连词成句</div>';
        if(d.chunks) h += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">' + d.chunks.map(c => '<span style="background:#e0e7ff;padding:4px 10px;border-radius:8px;font-size:14px;font-weight:600">' + esc(c) + '</span>').join('') + '</div>';
        if(d.en_hint) h += '<div style="font-size:12px;color:#888;margin-bottom:10px">💡 ' + esc(d.en_hint) + '</div>';
    } else if(st === 'g2') {
        h += '<div style="font-size:13px;color:#6366f1;font-weight:700;margin-bottom:6px">🖼️ 看图造句</div>';
        if(d.hint) h += '<div style="font-size:14px;padding:12px;background:#eff6ff;border-radius:10px;margin-bottom:10px">💡 ' + esc(d.hint) + '</div>';
        if(d.keywords) h += '<div style="font-size:13px;color:#888;margin-bottom:10px">关键词: ' + esc(d.keywords.join(', ')) + '</div>';
    } else if(st === 'g3') {
        h += '<div style="font-size:13px;color:#6366f1;font-weight:700;margin-bottom:6px">💡 情境挑战</div>';
        if(d.scenario) h += '<div style="font-size:14px;padding:12px;background:#fff7ed;border-radius:10px;margin-bottom:10px">' + esc(d.scenario) + '</div>';
        if(d.question) h += '<div style="font-size:14px;font-weight:600;margin-bottom:10px">❓ ' + esc(d.question) + '</div>';
    } else if(st === 't1') {
        h += '<div style="font-size:13px;color:#6366f1;font-weight:700;margin-bottom:6px">📝 挖空复述</div>';
        if(d.text) h += '<div style="font-size:14px;padding:12px;background:#f0fdf4;border-radius:10px;margin-bottom:6px">' + esc(d.text) + '</div>';
        if(d.en) h += '<div style="font-size:12px;color:#888;margin-bottom:10px">' + esc(d.en) + '</div>';
    } else if(st === 'tt') {
        h += '<div style="font-size:13px;color:#6366f1;font-weight:700;margin-bottom:6px">📝 课文题</div>';
        if(d.question) h += '<div style="font-size:16px;font-weight:600;padding:12px;background:#eff6ff;border-radius:10px;margin-bottom:10px">' + esc(d.question) + '</div>';
    } else {
        h += '<div style="font-size:14px;color:#888;margin-bottom:10px">请在下方输入答案</div>';
    }

    if(st === 'v5' && d.options && d.options.length) {
        h += '<div style="margin-top:8px"><input type="hidden" id="qInput" value=""><button id="qSendBtn" style="display:none"></button></div>';
    } else {
        h += '<div style="margin-top:8px"><textarea id="qInput" class="inp" placeholder="输入你的答案..." style="min-height:50px"></textarea>';
        h += '<button id="qSendBtn" onclick="sendQAnswer()" class="btn" style="margin-top:8px">提交答案 ✈️</button></div>';
    }
    h += '<div id="qResult" style="display:none;margin-top:10px"></div>';

    box.innerHTML = h;
    area.scrollIntoView({ behavior: 'smooth' });

    // 倒计时
    if(duration) {
        let remaining = duration;
        const timerEl = document.getElementById('qTimer');
        const qInt = setInterval(() => {
            remaining--;
            if(timerEl) timerEl.textContent = remaining;
            if(remaining <= 0) clearInterval(qInt);
        }, 1000);
    }

    // Enter发送
    setTimeout(() => {
        const inp = document.getElementById('qInput');
        if(inp) inp.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendQAnswer()} });
    }, 100);
}

function sendQAnswer() {
    if(qwSent) return;
    const inp = document.getElementById('qInput');
    if(!inp) return;
    const tx = inp.value.trim();
    if(!tx || !cl || !N) return;
    qwSent = true;
    const tm = new Date().toLocaleTimeString('zh-CN',{hour12:false});
    cl.publish(CA, JSON.stringify({name:N, text:tx, time:tm}));
    rec.unshift({text:tx, time:tm, likes:0, comment:''});
    drawRec();
    document.getElementById('qSendBtn').disabled = true;
    document.getElementById('qSendBtn').textContent = '✅ 已提交';
    toast('✅ 已提交', 'sent');
}

function showQuestionResult(d) {
    const resEl = document.getElementById('qResult');
    if(!resEl) return;
    resEl.style.display = 'block';
    const me = N.toLowerCase().trim();

    let myResult = null;
    if(d.results) {
        for(const [name, r] of Object.entries(d.results)) {
            const n = name.toLowerCase().trim();
            if(n === me || n.includes(me.split(' ')[0].toLowerCase()) || me.includes(n.split(' ')[0])) {
                myResult = r;
                break;
            }
        }
    }

    let h = '';
    if(myResult) {
        if(myResult.correct === true) {
            const pts = myResult.pts || 0;
            const rank = myResult.rank || 0;
            sc += pts;
            updSc();
            h += '<div style="text-align:center;padding:10px;background:#d1fae5;border-radius:10px;border:2px solid #10b981">';
            h += '<div style="font-size:24px">🎉</div>';
            h += '<div style="font-weight:700;color:#065f46">答对了！' + (rank ? '第'+rank+'名 ' : '') + '+' + pts + '分</div>';
            h += '</div>';
        } else if(myResult.correct === false) {
            h += '<div style="text-align:center;padding:10px;background:#fee2e2;border-radius:10px;border:2px solid #ef4444">';
            h += '<div style="font-size:24px">😅</div>';
            h += '<div style="font-weight:700;color:#991b1b">还不对哦</div>';
            if(d.correctAnswer) h += '<div style="color:#166534;font-weight:600;margin-top:4px">✅ ' + esc(d.correctAnswer) + '</div>';
            h += '</div>';
        }
    } else if(!qwSent) {
        h += '<div style="text-align:center;padding:10px;background:#f9fafb;border-radius:10px">';
        h += '<div style="color:#888">⏰ 未提交</div>';
        if(d.correctAnswer) h += '<div style="color:#166534;font-weight:600;margin-top:4px">✅ ' + esc(d.correctAnswer) + '</div>';
        h += '</div>';
    }

    // 排行榜
    if(d.scores && d.scores.length > 0) {
        h += '<div style="margin-top:10px;padding:10px;background:#fff;border-radius:10px;border:1px solid #e5e7eb">';
        h += '<div style="font-size:13px;font-weight:700;color:#6366f1;margin-bottom:6px">🏆 当前排名</div>';
        d.scores.slice(0, 10).forEach((s, i) => {
            const isMe = s.name.toLowerCase().trim() === me || s.name.toLowerCase().includes(me.split(' ')[0].toLowerCase());
            h += '<div style="display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:8px;margin:2px 0;' + (isMe ? 'background:#ede9fe;font-weight:800' : '') + '">';
            h += '<span style="min-width:20px;font-weight:700">' + (i<3?['🥇','🥈','🥉'][i]:(i+1)) + '</span>';
            h += '<span style="flex:1">' + esc(s.name) + (isMe?' ⭐':'') + '</span>';
            h += '<span style="font-weight:700;color:#6366f1">' + s.total + '分</span>';
            h += '</div>';
        });
        h += '</div>';
    }

    resEl.innerHTML = h;
}
function pickV5Option(btn, text) {
    if(qwSent) return;
    document.querySelectorAll('#v5Opts button').forEach(b => {
        b.style.borderColor = '#e5e7eb'; b.style.background = '#fff';
    });
    btn.style.borderColor = '#6366f1'; btn.style.background = '#ede9fe';
    document.getElementById('qInput').value = text;
    // 自动提交
    sendQAnswer();
}
</script>
